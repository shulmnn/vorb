name: Bug report
description: Report a reproducible problem in Vorb
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for helping improve Vorb. Never include API keys, recordings, or private transcripts.
  - type: input
    id: version
    attributes:
      label: Vorb version
      placeholder: 1.0.0 (1)
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS and Mac
      placeholder: macOS 15.5, MacBook Pro M3
    validations:
      required: true
  - type: dropdown
    id: provider
    attributes:
      label: Transcription mode
      options:
        - Local Whisper
        - Hosted provider
        - Self-hosted or custom endpoint
        - Not related to transcription
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: Tell us exactly what you did and what happened.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Sensitive data
      options:
        - label: I removed API keys, private audio, and sensitive transcript text.
          required: true
